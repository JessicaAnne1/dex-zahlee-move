<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7E5F"/>
      <stop offset="55%" stop-color="#FEB47B"/>
      <stop offset="100%" stop-color="#FBF3E0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="55%" stop-color="#F5C242"/>
      <stop offset="100%" stop-color="#E8A33D"/>
    </radialGradient>
    <linearGradient id="duneFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8553D"/>
      <stop offset="100%" stop-color="#8B3320"/>
    </linearGradient>
    <linearGradient id="duneBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8623D"/>
      <stop offset="100%" stop-color="#A8412C"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Sky -->
    <rect width="512" height="512" fill="url(#sky)"/>

    <!-- Sun -->
    <circle cx="256" cy="220" r="120" fill="url(#sun)"/>
    <!-- Sun glow -->
    <circle cx="256" cy="220" r="155" fill="#FFE066" opacity="0.18"/>

    <!-- Back dune -->
    <path d="M0,360 Q120,300 256,330 T512,310 L512,512 L0,512 Z" fill="url(#duneBack)"/>

    <!-- Tiny ute silhouette on the back dune -->
    <g transform="translate(330,318)" fill="#1F1612">
      <!-- body -->
      <rect x="0" y="6" width="38" height="14" rx="2"/>
      <!-- cab -->
      <path d="M2 6 L8 -4 L22 -4 L26 6 Z"/>
      <!-- tray -->
      <rect x="22" y="2" width="16" height="8" rx="1"/>
      <!-- wheels -->
      <circle cx="9" cy="22" r="5"/>
      <circle cx="30" cy="22" r="5"/>
      <circle cx="9" cy="22" r="2.2" fill="#E8A33D"/>
      <circle cx="30" cy="22" r="2.2" fill="#E8A33D"/>
    </g>

    <!-- Front dune -->
    <path d="M0,420 Q160,360 320,400 T512,390 L512,512 L0,512 Z" fill="url(#duneFront)"/>

    <!-- A few cheeky tufts on front dune -->
    <g fill="#5B7553">
      <path d="M80 410 q4 -10 8 0 q4 -8 8 0 q4 -10 8 0 z"/>
      <path d="M380 405 q3 -8 6 0 q3 -7 6 0 q3 -9 6 0 z"/>
    </g>
  </g>
</svg>
